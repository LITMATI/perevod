<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переводчик | Русский / Меллстройный / USB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
        }
        .panel {
            display: flex;
            gap: 1rem;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem 0 1rem;
            gap: 0.5rem;
        }
        select {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            outline: none;
        }
        textarea, .readonly-area {
            width: 100%;
            min-height: 220px;
            padding: 0.75rem 1rem 1rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            font-family: inherit;
            background: transparent;
            border: none;
            outline: none;
            resize: vertical;
            color: #0f172a;
        }
        textarea::placeholder {
            color: #cbd5e1;
        }
        .readonly-area {
            background: #fafcff;
            color: #1e293b;
            cursor: default;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .swap-btn {
            align-self: center;
            background: #f1f5f9;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #475569;
            flex-shrink: 0;
        }
        .swap-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        @media (max-width: 760px) {
            .panel {
                flex-direction: column;
            }
            .swap-btn {
                align-self: center;
                margin: 0.5rem 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(90deg) scale(1.02);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Переводчик</h1>
    <div class="panel">
        <div class="box">
            <div class="lang-header">
                <select id="leftLangSelect">
                    <option value="ru">Русский</option>
                    <option value="mell">Меллстройный</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <textarea id="inputArea" placeholder="Введите текст..."></textarea>
        </div>
        <button class="swap-btn" id="swapBtn">⇄</button>
        <div class="box">
            <div class="lang-header">
                <select id="rightLangSelect">
                    <option value="mell">Меллстройный</option>
                    <option value="ru">Русский</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <div class="readonly-area" id="outputArea"></div>
        </div>
    </div>
</div>

<script>
    const rusToMellExceptions = new Map([
        ["русский язык", "Меллстройность"],
        ["училка", "Учительность"],
        ["друг", "Друн"],
        ["друган", "Друность"],
        ["дружбан", "Друность"],
        ["ученик", "Учинительность"],
        ["учеба", "Учебность"],
        ["кто это", "Кьо этость"],
        ["я", "Ч"],
        ["жопа", "жопотность"],
        ["не", "отказано"],
        ["нет", "отказано"],
        ["не разрешаю", "отказано"],
        ["почему", "П.Ч.Т.М.Ш"],
        ["спасибо", "спасибо хорошо"],
        ["хорошо", "хорошо и спасибо"],
        ["кака", "какатность"],
        ["сиди", "сидить"],
        ["какашка", "какашатность"],
        ["плохое", "шакал ебучий"],
        ["нормально", "ну нормально не ну еще посидим еще посидим"],
        ["сиди и не пизди", "Сидит и не пизидит"]
    ]);

    const mellToRusExceptions = new Map();
    for (let [rus, mell] of rusToMellExceptions.entries()) {
        mellToRusExceptions.set(mell.toLowerCase(), rus);
    }
    const extraReverse = [
        ["друн", "друг"], ["друность", "друган"], ["учительность", "училка"],
        ["учинительность", "ученик"], ["учебность", "учеба"], ["кьо этость", "кто это"],
        ["кьо", "кто"], ["этость", "это"], ["ч", "я"], ["меллстройность", "русский язык"],
        ["жопотность", "жопа"], ["отказано", "не"], ["п.ч.т.м.ш", "почему"],
        ["спасибо хорошо", "спасибо"], ["хорошо и спасибо", "хорошо"],
        ["какатность", "кака"], ["сидить", "сиди"], ["какашатность", "какашка"],
        ["шакал ебучий", "плохое"], ["ну нормально не ну еще посидим еще посидим", "нормально"],
        ["сидит и не пизидит", "сиди и не пизди"]
    ];
    for (let [mell, rus] of extraReverse) {
        mellToRusExceptions.set(mell, rus);
    }

    const rusToUsbExceptions = new Map([
        ["русский язык", "USB"],
        ["училка", "UCHILKE"],
        ["друг", "DRUG"],
        ["друган", "DRUGA"],
        ["дружбан", "DRUGAN"],
        ["ученик", "UCHINIK"],
        ["учеба", "UCHBA"],
        ["кто это", "KTO ETA"],
        ["я", "IA"],
        ["жопа", "SHOPA"],
        ["не", "NIE"],
        ["нет", "NIET"],
        ["не разрешаю", "NIE RASHA"],
        ["почему", "PCHMA"],
        ["спасибо", "SPS"],
        ["хорошо", "OkEy"],
        ["кака", "KAKA"],
        ["сиди", "CD"],
        ["какашка", "KAKASHEHKA"],
        ["плохое", "PLXO"],
        ["нормально", "NORM"],
        ["сиди и не пизди", "CD I NIE PCD"]
    ]);

    const usbToRusExceptions = new Map();
    for (let [rus, usb] of rusToUsbExceptions.entries()) {
        usbToRusExceptions.set(usb.toLowerCase(), rus);
    }

    const phraseRusToMell = [
        ["русский язык", "Меллстройность"],
        ["кто это", "Кьо этость"],
        ["не разрешаю", "отказано"],
        ["спасибо", "спасибо хорошо"],
        ["хорошо", "хорошо и спасибо"],
        ["плохое", "шакал ебучий"],
        ["нормально", "ну нормально не ну еще посидим еще посидим"],
        ["сиди и не пизди", "Сидит и не пизидит"]
    ];
    const phraseMellToRus = [
        ["шакал ебучий", "плохое"],
        ["спасибо хорошо", "спасибо"],
        ["хорошо и спасибо", "хорошо"],
        ["ну нормально не ну еще посидим еще посидим", "нормально"],
        ["кьо этость", "кто это"],
        ["меллстройность", "русский язык"],
        ["п.ч.т.м.ш", "почему"],
        ["отказано", "не"],
        ["сидит и не пизидит", "сиди и не пизди"]
    ];
    const phraseRusToUsb = [
        ["русский язык", "USB"],
        ["кто это", "KTO ETA"],
        ["не разрешаю", "NIE RASHA"],
        ["спасибо", "SPS"],
        ["хорошо", "OkEy"],
        ["плохое", "PLXO"],
        ["нормально", "NORM"],
        ["сиди и не пизди", "CD I NIE PCD"]
    ];
    const phraseUsbToRus = [
        ["usb", "русский язык"],
        ["kto eta", "кто это"],
        ["nie rasha", "не разрешаю"],
        ["sps", "спасибо"],
        ["okey", "хорошо"],
        ["plxo", "плохое"],
        ["norm", "нормально"],
        ["cd i nie pcd", "сиди и не пизди"]
    ];

    phraseRusToMell.sort((a,b) => b[0].length - a[0].length);
    phraseMellToRus.sort((a,b) => b[0].length - a[0].length);
    phraseRusToUsb.sort((a,b) => b[0].length - a[0].length);
    phraseUsbToRus.sort((a,b) => b[0].length - a[0].length);

    function isGarbageWord(word) {
        if (!word || word.length === 0) return true;
        const lower = word.toLowerCase();
        if (word.length <= 2 && !rusToMellExceptions.has(lower) && !rusToUsbExceptions.has(lower)) return true;
        const laughPatterns = [
            /(ха){2,}/i, /(ах){2,}/i, /(ол){2,}/i, /(ло){2,}/i, /(ла){2,}/i,
            /хехе/i, /хихи/i, /хохо/i, /лол/i, /кек/i, /агага/i, /уху/i,
            /ааа+/i, /ыыы+/i, /еее+/i
        ];
        for (let p of laughPatterns) if (p.test(lower)) return true;
        if (/(.)\1{3,}/i.test(lower)) return true;
        if (word === word.toUpperCase() && lower.length >= 4 && /^(?:[а-яa-z])(?:[^а-яa-z]?\1)+$/i.test(lower)) return true;
        if (!/[аеёиоуыэюяaeiou]/i.test(lower)) return true;
        return false;
    }

    function applyGeneralRule(wordLower) {
        if (wordLower.endsWith("а")) return wordLower.slice(0, -1) + "оность";
        if (wordLower.endsWith("я")) return wordLower.slice(0, -1) + "ёность";
        if (wordLower.endsWith("о")) return wordLower.slice(0, -1) + "ость";
        if (wordLower.endsWith("е")) return wordLower.slice(0, -1) + "есть";
        return wordLower + "ность";
    }

    function reverseGeneralRule(wordLower) {
        if (wordLower.endsWith("оность")) {
            let base = wordLower.slice(0, -6);
            if (base) return base + "а";
        }
        if (wordLower.endsWith("ёность")) {
            let base = wordLower.slice(0, -6);
            if (base) return base + "я";
        }
        if (wordLower.endsWith("ость")) {
            let base = wordLower.slice(0, -4);
            if (base) return base + "о";
        }
        if (wordLower.endsWith("есть")) {
            let base = wordLower.slice(0, -4);
            if (base) return base + "е";
        }
        if (wordLower.endsWith("ность")) {
            let base = wordLower.slice(0, -5);
            if (base) return base;
        }
        return null;
    }

    function applyCase(original, transformed) {
        if (!original || !transformed) return transformed;
        if (original === original.toUpperCase()) return transformed.toUpperCase();
        if (original[0] === original[0].toUpperCase() && original.slice(1).toLowerCase() === original.slice(1))
            return transformed.charAt(0).toUpperCase() + transformed.slice(1).toLowerCase();
        return transformed.toLowerCase();
    }

    function tokenize(text) {
        const regex = /([a-zA-Zа-яА-ЯёЁ]+|[^a-zA-Zа-яА-ЯёЁ]+)/g;
        return text.match(regex) || [];
    }

    function translateDirect(text, srcLang, dstLang) {
        if (!text.trim()) return "";
        if (srcLang === dstLang) return text;

        let working = text;
        const placeholders = new Map();
        let idx = 0;

        let phrasesFrom, exceptionsMap, generalRule, useGeneralRule = true;
        if (srcLang === 'ru' && dstLang === 'mell') {
            phrasesFrom = phraseRusToMell;
            exceptionsMap = rusToMellExceptions;
            generalRule = applyGeneralRule;
        } else if (srcLang === 'mell' && dstLang === 'ru') {
            phrasesFrom = phraseMellToRus;
            exceptionsMap = mellToRusExceptions;
            generalRule = reverseGeneralRule;
        } else if (srcLang === 'ru' && dstLang === 'usb') {
            phrasesFrom = phraseRusToUsb;
            exceptionsMap = rusToUsbExceptions;
            useGeneralRule = false;
            generalRule = null;
        } else if (srcLang === 'usb' && dstLang === 'ru') {
            phrasesFrom = phraseUsbToRus;
            exceptionsMap = usbToRusExceptions;
            useGeneralRule = false;
            generalRule = null;
        } else {
            return text;
        }

        if (phrasesFrom) {
            for (let [from, to] of phrasesFrom) {
                const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
                working = working.replace(regex, (match, before, word) => {
                    let replacement = to;
                    if (word === word.toUpperCase()) replacement = to.toUpperCase();
                    else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                        replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                    else replacement = to.toLowerCase();
                    const ph = `\uE000${idx++}\uE001`;
                    placeholders.set(ph, replacement);
                    return before + ph;
                });
            }
        }

        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) {
                out.push(placeholders.get(t));
                continue;
            }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) {
                out.push(t);
                continue;
            }
            const low = t.toLowerCase();
            if (exceptionsMap && exceptionsMap.has(low)) {
                out.push(applyCase(t, exceptionsMap.get(low)));
                continue;
            }
            if (srcLang === 'ru' && dstLang === 'mell' && isGarbageWord(t)) {
                out.push(t);
                continue;
            }
            if (useGeneralRule && generalRule) {
                let transformed = generalRule(low);
                if (transformed) {
                    out.push(applyCase(t, transformed));
                } else {
                    out.push(t);
                }
            } else {
                out.push(t);
            }
        }
        return out.join('');
    }

    function translateViaRussian(text, srcLang, dstLang) {
        const rus = translateDirect(text, srcLang, 'ru');
        return translateDirect(rus, 'ru', dstLang);
    }

    function translate(text, srcLang, dstLang) {
        if (srcLang === dstLang) return text;
        if ((srcLang === 'usb' && dstLang === 'mell') || (srcLang === 'mell' && dstLang === 'usb')) {
            return translateViaRussian(text, srcLang, dstLang);
        }
        return translateDirect(text, srcLang, dstLang);
    }

    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const leftLangSelect = document.getElementById('leftLangSelect');
    const rightLangSelect = document.getElementById('rightLangSelect');
    const swapBtn = document.getElementById('swapBtn');

    function updateTranslation() {
        const srcLang = leftLangSelect.value;
        const dstLang = rightLangSelect.value;
        const inputText = inputArea.value;
        const result = translate(inputText, srcLang, dstLang);
        outputArea.innerText = result;
    }

    let debounceTimer;
    function debouncedUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateTranslation, 250);
    }

    inputArea.addEventListener('input', debouncedUpdate);
    leftLangSelect.addEventListener('change', debouncedUpdate);
    rightLangSelect.addEventListener('change', debouncedUpdate);

    function swapLanguages() {
        const leftLang = leftLangSelect.value;
        const rightLang = rightLangSelect.value;
        leftLangSelect.value = rightLang;
        rightLangSelect.value = leftLang;
        const leftText = inputArea.value;
        const rightText = outputArea.innerText;
        inputArea.value = rightText;
        updateTranslation();
    }

    swapBtn.addEventListener('click', swapLanguages);

    inputArea.value = 'привет';
    leftLangSelect.value = 'usb';
    rightLangSelect.value = 'mell';
    updateTranslation();
</script>
</body>
</html>
