<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переводчик | Русский / Меллстройный / USB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
        }
        .panel {
            display: flex;
            gap: 1rem;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem 0 1rem;
            gap: 0.5rem;
        }
        select {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            outline: none;
        }
        textarea, .readonly-area {
            width: 100%;
            min-height: 220px;
            padding: 0.75rem 1rem 1rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            font-family: inherit;
            background: transparent;
            border: none;
            outline: none;
            resize: vertical;
            color: #0f172a;
        }
        textarea::placeholder {
            color: #cbd5e1;
        }
        .readonly-area {
            background: #fafcff;
            color: #1e293b;
            cursor: default;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .swap-btn {
            align-self: center;
            background: #f1f5f9;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #475569;
            flex-shrink: 0;
        }
        .swap-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        @media (max-width: 760px) {
            .panel {
                flex-direction: column;
            }
            .swap-btn {
                align-self: center;
                margin: 0.5rem 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(90deg) scale(1.02);
            }
        }
        .beta-watermark {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
            font-weight: bold;
            font-size: clamp(3rem, 15vw, 12rem);
            color: #000000;
            opacity: 0.12;
            white-space: nowrap;
            transform: rotate(-15deg);
            letter-spacing: 0.2em;
            user-select: none;
        }
        @media (max-width: 600px) {
            .beta-watermark {
                opacity: 0.08;
                font-size: clamp(2rem, 12vw, 8rem);
            }
        }
        .status {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #4a6a8a;
        }
    </style>
</head>
<body>
<div class="beta-watermark" id="betaLabel">BETA 5.7</div>
<div class="container">
    <h1>Переводчик</h1>
    <div class="panel">
        <div class="box">
            <div class="lang-header">
                <select id="leftLangSelect">
                    <option value="ru">Русский</option>
                    <option value="mell">Меллстройный</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <textarea id="inputArea" placeholder="Введите текст..."></textarea>
        </div>
        <button class="swap-btn" id="swapBtn">⇄</button>
        <div class="box">
            <div class="lang-header">
                <select id="rightLangSelect">
                    <option value="mell">Меллстройный</option>
                    <option value="ru">Русский</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <div class="readonly-area" id="outputArea"></div>
        </div>
    </div>
    <div class="status" id="statusMsg">Загрузка словаря...</div>
</div>
<script>
    let rusToMellExceptions = new Map();
    let rusToUsbExceptions = new Map();
    let mellToRusExceptions = new Map();
    let usbToRusExceptions = new Map();
    let phraseRusToMell = [];
    let phraseMellToRus = [];
    let phraseRusToUsb = [];
    let phraseUsbToRus = [];

    const cyrillicToLatin = {
        'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z',
        'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
        'с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh',
        'щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
    };
    const latinToCyrillic = {
        'a':'а','b':'б','v':'в','g':'г','d':'д','e':'е','yo':'ё','zh':'ж','z':'з',
        'i':'и','y':'й','k':'к','l':'л','m':'м','n':'н','o':'о','p':'п','r':'р',
        's':'с','t':'т','u':'у','f':'ф','kh':'х','ts':'ц','ch':'ч','sh':'ш',
        'shch':'щ','yu':'ю','ya':'я','ye':'е','yi':'ы'
    };

    function translitToLatin(text) {
        let result = '';
        for (let ch of text) {
            let low = ch.toLowerCase();
            if (cyrillicToLatin[low]) {
                let repl = cyrillicToLatin[low];
                if (ch === ch.toUpperCase() && ch !== low) repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                result += repl;
            } else result += ch;
        }
        return result;
    }
    function translitToCyrillic(text) {
        let result = '';
        let i = 0;
        while (i < text.length) {
            let matched = false;
            for (let len = 4; len >= 1; len--) {
                let part = text.substr(i, len).toLowerCase();
                if (latinToCyrillic[part]) {
                    let repl = latinToCyrillic[part];
                    let orig = text.substr(i, len);
                    if (orig === orig.toUpperCase()) repl = repl.toUpperCase();
                    else if (orig[0] === orig[0].toUpperCase() && orig.slice(1).toLowerCase() === orig.slice(1))
                        repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                    result += repl;
                    i += len;
                    matched = true;
                    break;
                }
            }
            if (!matched) { result += text[i]; i++; }
        }
        return result;
    }

    function isGarbageWord(word) {
        if (!word || word.length === 0) return true;
        const lower = word.toLowerCase();
        if (word.length <= 2 && !rusToMellExceptions.has(lower)) return true;
        const laughPatterns = [
            /(ха){2,}/i, /(ах){2,}/i, /(ол){2,}/i, /(ло){2,}/i, /(ла){2,}/i,
            /хехе/i, /хихи/i, /хохо/i, /лол/i, /кек/i, /агага/i, /уху/i,
            /ааа+/i, /ыыы+/i, /еее+/i
        ];
        for (let p of laughPatterns) if (p.test(lower)) return true;
        if (/(.)\1{3,}/i.test(lower)) return true;
        if (word === word.toUpperCase() && lower.length >= 4 && /^(?:[а-яa-z])(?:[^а-яa-z]?\1)+$/i.test(lower)) return true;
        if (!/[аеёиоуыэюяaeiou]/i.test(lower)) return true;
        return false;
    }

    function applyGeneralRule(wordLower) {
        if (wordLower.endsWith("а")) return wordLower.slice(0, -1) + "оность";
        if (wordLower.endsWith("я")) return wordLower.slice(0, -1) + "ёность";
        if (wordLower.endsWith("о")) return wordLower.slice(0, -1) + "ость";
        if (wordLower.endsWith("е")) return wordLower.slice(0, -1) + "есть";
        return wordLower + "ность";
    }
    function reverseGeneralRule(wordLower) {
        if (wordLower.endsWith("оность")) { let b = wordLower.slice(0, -6); if (b) return b + "а"; }
        if (wordLower.endsWith("ёность")) { let b = wordLower.slice(0, -6); if (b) return b + "я"; }
        if (wordLower.endsWith("ость")) { let b = wordLower.slice(0, -4); if (b) return b + "о"; }
        if (wordLower.endsWith("есть")) { let b = wordLower.slice(0, -4); if (b) return b + "е"; }
        if (wordLower.endsWith("ность")) { let b = wordLower.slice(0, -5); if (b) return b; }
        return null;
    }
    function applyCase(original, transformed) {
        if (!original || !transformed) return transformed;
        if (original === original.toUpperCase()) return transformed.toUpperCase();
        if (original[0] === original[0].toUpperCase() && original.slice(1).toLowerCase() === original.slice(1))
            return transformed.charAt(0).toUpperCase() + transformed.slice(1).toLowerCase();
        return transformed.toLowerCase();
    }
    function tokenize(text) {
        const regex = /([a-zA-Zа-яА-ЯёЁ]+|[^a-zA-Zа-яА-ЯёЁ]+)/g;
        return text.match(regex) || [];
    }

    function translateToMell(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseRusToMell) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) { out.push(placeholders.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            const low = t.toLowerCase();
            if (rusToMellExceptions.has(low)) { out.push(applyCase(t, rusToMellExceptions.get(low))); continue; }
            if (isGarbageWord(t)) { out.push(t); continue; }
            out.push(applyCase(t, applyGeneralRule(low)));
        }
        return out.join('');
    }
    function translateToRus(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseMellToRus) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) { out.push(placeholders.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            const low = t.toLowerCase();
            if (mellToRusExceptions.has(low)) { out.push(applyCase(t, mellToRusExceptions.get(low))); continue; }
            const rec = reverseGeneralRule(low);
            if (rec) out.push(applyCase(t, rec));
            else out.push(t);
        }
        let res = out.join('');
        res = res.replace(/\bЧ\b/g, 'Я').replace(/\bч\b/g, 'я');
        return res;
    }
    function translateToUsb(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseRusToUsb) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) { out.push(placeholders.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            const low = t.toLowerCase();
            if (rusToUsbExceptions.has(low)) { out.push(applyCase(t, rusToUsbExceptions.get(low))); continue; }
            out.push(translitToLatin(t));
        }
        return out.join('');
    }
    function translateFromUsb(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseUsbToRus) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) { out.push(placeholders.get(t)); continue; }
            if (!/[a-zA-Z]/.test(t)) { out.push(t); continue; }
            const low = t.toLowerCase();
            if (usbToRusExceptions.has(low)) { out.push(applyCase(t, usbToRusExceptions.get(low))); continue; }
            out.push(translitToCyrillic(t));
        }
        return out.join('');
    }

    async function loadDictionary() {
        try {
            const response = await fetch('dictionary.json');
            if (!response.ok) throw new Error('Ошибка загрузки');
            const dict = await response.json();
            if (dict.rusToMell) {
                for (const [k,v] of Object.entries(dict.rusToMell)) rusToMellExceptions.set(k.toLowerCase(), v);
            }
            if (dict.rusToUsb) {
                for (const [k,v] of Object.entries(dict.rusToUsb)) rusToUsbExceptions.set(k.toLowerCase(), v);
            }
            for (let [rus, mell] of rusToMellExceptions.entries()) mellToRusExceptions.set(mell.toLowerCase(), rus);
            for (let [rus, usb] of rusToUsbExceptions.entries()) usbToRusExceptions.set(usb.toLowerCase(), rus);
            const baseMellPhrases = [
                ["русский язык", "Меллстройность"],
                ["кто это", "Кьо этость"],
                ["не разрешаю", "отказано"],
                ["спасибо", "спасибо хорошо"],
                ["хорошо", "хорошо и спасибо"],
                ["плохое", "шакал ебучий"],
                ["нормально", "ну нормально не ну еще посидим еще посидим"],
                ["сиди и не пизди", "Сидит и не пизидит"],
                ["а почему бы и нет", "А П.Ч.Т.М.Ш и нетность"]
            ];
            phraseRusToMell = [...baseMellPhrases];
            phraseMellToRus = [
                ["шакал ебучий", "плохое"],["спасибо хорошо","спасибо"],["хорошо и спасибо","хорошо"],
                ["ну нормально не ну еще посидим еще посидим","нормально"],["кьо этость","кто это"],
                ["меллстройность","русский язык"],["п.ч.т.м.ш","почему"],["отказано","не"],
                ["сидит и не пизидит","сиди и не пизди"],["а п.ч.т.м.ш и нетность","а почему бы и нет"]
            ];
            phraseRusToUsb = [
                ["русский язык","USB"],["кто это","KTO ETA"],["не разрешаю","NIE RASHA"],
                ["спасибо","SPS"],["хорошо","OkEy"],["плохое","PLXO"],["нормально","NORM"],
                ["сиди и не пизди","CD I NIE PCD"],["а почему бы и нет","PCHM BI I NIET"]
            ];
            phraseUsbToRus = [
                ["usb","русский язык"],["kto eta","кто это"],["nie rasha","не разрешаю"],
                ["sps","спасибо"],["okey","хорошо"],["plxo","плохое"],["norm","нормально"],
                ["cd i nie pcd","сиди и не пизди"],["pchm bi i niet","а почему бы и нет"],
                ["fbo","фобия"],["i","и"],["chpric","шприц"],["slabit","слабительное"],
                ["kaif","кайф"],["pcd","пизди"],["vygnala","выгнала"],["kota","кота"],
                ["kotya","котя"],["klva","клава"],["kstyan","костян"],["say","зай"],
                ["englsh","english"],["rsskiy","русский"],["yasik","язык"],["xrnia","херней"],
                ["zanimaessya","занимешься"]
            ];
            phraseRusToMell.sort((a,b)=>b[0].length-a[0].length);
            phraseMellToRus.sort((a,b)=>b[0].length-a[0].length);
            phraseRusToUsb.sort((a,b)=>b[0].length-a[0].length);
            phraseUsbToRus.sort((a,b)=>b[0].length-a[0].length);
            document.getElementById('statusMsg').innerHTML = 'Словарь загружен';
            updateTranslation();
        } catch(e) {
            console.error(e);
            document.getElementById('statusMsg').innerHTML = 'Ошибка загрузки dictionary.json. Убедитесь, что файл лежит рядом.';
        }
    }

    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const leftLangSelect = document.getElementById('leftLangSelect');
    const rightLangSelect = document.getElementById('rightLangSelect');
    const swapBtn = document.getElementById('swapBtn');
    function updateTranslation() {
        const src = leftLangSelect.value, dst = rightLangSelect.value;
        if (src === dst) { outputArea.innerText = inputArea.value; return; }
        const text = inputArea.value;
        let result;
        if (src === 'ru' && dst === 'mell') result = translateToMell(text);
        else if (src === 'mell' && dst === 'ru') result = translateToRus(text);
        else if (src === 'ru' && dst === 'usb') result = translateToUsb(text);
        else if (src === 'usb' && dst === 'ru') result = translateFromUsb(text);
        else if (src === 'mell' && dst === 'usb') result = translateToUsb(translateToRus(text));
        else if (src === 'usb' && dst === 'mell') result = translateToMell(translateFromUsb(text));
        else result = text;
        outputArea.innerText = result;
    }
    let debounceTimer;
    function debouncedUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateTranslation, 250);
    }
    inputArea.addEventListener('input', debouncedUpdate);
    leftLangSelect.addEventListener('change', () => {
        if (leftLangSelect.value === rightLangSelect.value) {
            const other = leftLangSelect.value === 'ru' ? 'mell' : (leftLangSelect.value === 'mell' ? 'usb' : 'ru');
            rightLangSelect.value = other;
        }
        debouncedUpdate();
    });
    rightLangSelect.addEventListener('change', () => {
        if (rightLangSelect.value === leftLangSelect.value) {
            const other = rightLangSelect.value === 'ru' ? 'mell' : (rightLangSelect.value === 'mell' ? 'usb' : 'ru');
            leftLangSelect.value = other;
        }
        debouncedUpdate();
    });
    function swapLanguages() {
        const l = leftLangSelect.value, r = rightLangSelect.value;
        leftLangSelect.value = r; rightLangSelect.value = l;
        const lt = inputArea.value, rt = outputArea.innerText;
        inputArea.value = rt;
        updateTranslation();
    }
    swapBtn.addEventListener('click', swapLanguages);
    document.getElementById('betaLabel').innerText = "BETA 5.7";
    inputArea.value = 'нормально, попа, жопа, училка, нет, почему, хай, шприц';
    loadDictionary();
</script>
</body>
</html>
