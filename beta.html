<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переводчик | Русский / Меллстройный / USB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
        }
        .panel {
            display: flex;
            gap: 1rem;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem 0 1rem;
            gap: 0.5rem;
        }
        select {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            outline: none;
        }
        textarea, .readonly-area {
            width: 100%;
            min-height: 220px;
            padding: 0.75rem 1rem 1rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            font-family: inherit;
            background: transparent;
            border: none;
            outline: none;
            resize: vertical;
            color: #0f172a;
        }
        textarea::placeholder {
            color: #cbd5e1;
        }
        .readonly-area {
            background: #fafcff;
            color: #1e293b;
            cursor: default;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .swap-btn {
            align-self: center;
            background: #f1f5f9;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #475569;
            flex-shrink: 0;
        }
        .swap-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        @media (max-width: 760px) {
            .panel {
                flex-direction: column;
            }
            .swap-btn {
                align-self: center;
                margin: 0.5rem 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(90deg) scale(1.02);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Переводчик</h1>
    <div class="panel">
        <div class="box">
            <div class="lang-header">
                <select id="leftLangSelect">
                    <option value="ru">Русский</option>
                    <option value="mell">Меллстройный</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <textarea id="inputArea" placeholder="Введите текст..."></textarea>
        </div>
        <button class="swap-btn" id="swapBtn">⇄</button>
        <div class="box">
            <div class="lang-header">
                <select id="rightLangSelect">
                    <option value="mell">Меллстройный</option>
                    <option value="ru">Русский</option>
                    <option value="usb">USB</option>

            </div>
            <div class="readonly-area" id="outputArea"></div>

</div>

<script>
    // ======================= СЛОВАРИ ИСКЛЮЧЕНИЙ (ПОЛНОСТЬЮ ИЗ ВАШЕГО EXCEL) =======================
    const rusToMellExceptions = new Map([

        ["слабительное", "элджеевка"],
        ["кайф", "элджеевка"],
        ["юсб", "ЮСБЯ"],
        ["usb", "USBIs"],

    const mellToRusExceptions = new Map();
    for (let [rus, mell] of rusToMellExceptions.entries()) {
        mellToRusExceptions.set(mell.toLowerCase(), rus);
    }
    const extraReverse = [
        ["друн", "друг"], ["друность", "друган"], ["учительность", "училка"],
        ["учинительность", "ученик"], ["учебность", "учеба"], ["кьо этость", "кто это"],
        ["кьо", "кто"], ["этость", "это"], ["ч", "я"], ["меллстройность", "русский язык"],
        ["жопотность", "жопа"], ["отказано", "не"], ["п.ч.т.м.ш", "почему"],
        ["спасибо хорошо", "спасибо"], ["хорошо и спасибо", "хорошо"],
        ["какатность", "кака"], ["сидить", "сиди"], ["какашатность", "какашка"],
        ["шакал ебучий", "плохое"], ["ну нормально не ну еще посидим еще посидим", "нормально"],
        ["сидит и не пизидит", "сиди и не пизди"], ["фобиянка", "фобия"],
        ["элджеевка", "шприц"], ["юсбя", "юсб"], ["usbis", "usb"], ["пизиди", "пизди"],
        ["выгналось", "выгнала"], ["котность", "кота"], ["котьян", "котя"],
        ["клавотность", "клава"], ["котсяшка", "костян"],

        ["языкотность", "язык"], ["хернейностью", "херней"], ["занимательно", "занимешься"]
    ];
    for (let [mell, rus] of extraReverse) {
        if (!mellToRusExceptions.has(mell)) mellToRusExceptions.set(mell, rus);
    }

    const rusToUsbExceptions = new Map([
        ["русский язык", "USB"],
        ["училка", "UCHILKE"],
        ["друг", "DRUG"],
        ["друган", "DRUGA"],
        ["дружбан", "DRUGAN"],
        ["ученик", "UCHINIK"],
        ["учеба", "UCHBA"],
        ["кто это", "KTO ETA"],
        ["я", "IA"],
        ["жопа", "SHOPA"],
        ["не", "NIE"],
        ["нет", "NIET"],
        ["не разрешаю", "NIE RASHA"],
        ["почему", "PCHMA"],
        ["спасибо", "SPS"],
        ["хорошо", "OkEy"],
        ["кака", "KAKA"],
        ["сиди", "CD"],
        ["какашка", "KAKASHEHKA"],
        ["плохое", "PLXO"],
        ["нормально", "NORM"],
        ["сиди и не пизди", "CD I NIE PCD"],
        ["фобия", "FBO"],
        ["и", "I"],
        ["шприц", "CHPRIC"],
        ["слабительное", "SLABIT"],
        ["кайф", "KAIF"],
        ["юсб", "USB"],
        ["usb", "USB"],
        ["пизди", "pcd"],
        ["выгнала", "VYGNALA"],
        ["кота", "Kota"],
        ["котя", "Kotya"],
        ["клава", "KLVA"],
        ["костян", "KSTYAN"],
        ["а почему бы и нет", "PCHM BI I NIET"],
        ["зай", "Say"],
        ["english", "Englsh"],
        ["русский", "RssKiy"],
        ["язык", "Yasik"],
        ["херней", "XRNIA"],
        ["занимешься", "zanimaessya"]
    ]);

    const usbToRusExceptions = new Map();
    for (let [rus, usb] of rusToUsbExceptions.entries()) {
        usbToRusExceptions.set(usb.toLowerCase(), rus);
    }
    // Дополнительные обратные соответствия для USB
    const extraUsbReverse = [
        ["usb", "русский язык"], ["kto eta", "кто это"], ["nie rasha", "не разрешаю"],
        ["sps", "спасибо"], ["okey", "хорошо"], ["plxo", "плохое"], ["norm", "нормально"],
        ["cd i nie pcd", "сиди и не пизди"], ["pchm bi i niet", "а почему бы и нет"],
        ["fbo", "фобия"], ["i", "и"], ["chpric", "шприц"], ["slabit", "слабительное"],
        ["kaif", "кайф"], ["pcd", "пизди"], ["vygnala", "выгнала"], ["kota", "кота"],
        ["kotya", "котя"], ["klva", "клава"], ["kstyan", "костян"], ["say", "зай"],
        ["englsh", "english"], ["rsskiy", "русский"], ["yasik", "язык"], ["xrnia", "херней"],
        ["zanimaessya", "занимешься"]
    ];
    for (let [usb, rus] of extraUsbReverse) {
        if (!usbToRusExceptions.has(usb)) usbToRusExceptions.set(usb, rus);
    }

    // Фразы для приоритетной замены (длинные составные)
    const phraseRusToMell = [
        ["русский язык", "Меллстройность"],
        ["кто это", "Кьо этость"],
        ["не разрешаю", "отказано"],
        ["спасибо", "спасибо хорошо"],
        ["хорошо", "хорошо и спасибо"],
        ["плохое", "шакал ебучий"],
        ["нормально", "ну нормально не ну еще посидим еще посидим"],
        ["сиди и не пизди", "Сидит и не пизидит"],
        ["а почему бы и нет", "А П.Ч.Т.М.Ш и нетность"]
    ];
    const phraseMellToRus = [
        ["шакал ебучий", "плохое"],
        ["спасибо хорошо", "спасибо"],
        ["хорошо и спасибо", "хорошо"],
        ["ну нормально не ну еще посидим еще посидим", "нормально"],
        ["кьо этость", "кто это"],
        ["меллстройность", "русский язык"],
        ["п.ч.т.м.ш", "почему"],
        ["отказано", "не"],
        ["сидит и не пизидит", "сиди и не пизди"],
        ["а п.ч.т.м.ш и нетность", "а почему бы и нет"]
    ];
    const phraseRusToUsb = [
        ["русский язык", "USB"],
        ["кто это", "KTO ETA"],
        ["не разрешаю", "NIE RASHA"],
        ["спасибо", "SPS"],
        ["хорошо", "OkEy"],
        ["плохое", "PLXO"],
        ["нормально", "NORM"],
        ["сиди и не пизди", "CD I NIE PCD"],
        ["а почему бы и нет", "PCHM BI I NIET"]
    ];
    const phraseUsbToRus = [
        ["usb", "русский язык"],
        ["kto eta", "кто это"],
        ["nie rasha", "не разрешаю"],
        ["sps", "спасибо"],
        ["okey", "хорошо"],
        ["plxo", "плохое"],
        ["norm", "нормально"],
        ["cd i nie pcd", "сиди и не пизди"],
        ["pchm bi i niet", "а почему бы и нет"],
        ["fbo", "фобия"],
        ["i", "и"],
        ["chpric", "шприц"],
        ["slabit", "слабительное"],
        ["kaif", "кайф"],
        ["pcd", "пизди"],
        ["vygnala", "выгнала"],
        ["kota", "кота"],
        ["kotya", "котя"],
        ["klva", "клава"],
        ["kstyan", "костян"],
        ["say", "зай"],
        ["englsh", "english"],
        ["rsskiy", "русский"],
        ["yasik", "язык"],
        ["xrnia", "херней"],
        ["zanimaessya", "занимешься"]
    ];

    // Сортировка по длине для корректной замены
    phraseRusToMell.sort((a,b) => b[0].length - a[0].length);
    phraseMellToRus.sort((a,b) => b[0].length - a[0].length);
    phraseRusToUsb.sort((a,b) => b[0].length - a[0].length);
    phraseUsbToRus.sort((a,b) => b[0].length - a[0].length);

    // Транслитерация для USB (русская -> латиница)
    const cyrillicToLatin = {
        'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z',
        'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
        'с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh',
        'щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
    };
    const latinToCyrillic = {
        'a':'а','b':'б','v':'в','g':'г','d':'д','e':'е','yo':'ё','zh':'ж','z':'з',
        'i':'и','y':'й','k':'к','l':'л','m':'м','n':'н','o':'о','p':'п','r':'р',
        's':'с','t':'т','u':'у','f':'ф','kh':'х','ts':'ц','ch':'ч','sh':'ш',
        'shch':'щ','yu':'ю','ya':'я','ye':'е','yi':'ы'
    };

    function translitToLatin(text) {
        let result = '';
        for (let ch of text) {
            let low = ch.toLowerCase();
            if (cyrillicToLatin[low]) {
                let repl = cyrillicToLatin[low];
                if (ch === ch.toUpperCase() && ch !== low) {
                    repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                }
                result += repl;
            } else {
                result += ch;
            }
        }
        return result;
    }

    function translitToCyrillic(text) {
        let result = '';
        let i = 0;
        while (i < text.length) {
            let matched = false;
            for (let len = 4; len >= 1; len--) {
                let part = text.substr(i, len).toLowerCase();
                if (latinToCyrillic[part]) {
                    let repl = latinToCyrillic[part];
                    let orig = text.substr(i, len);
                    if (orig === orig.toUpperCase()) repl = repl.toUpperCase();
                    else if (orig[0] === orig[0].toUpperCase() && orig.slice(1).toLowerCase() === orig.slice(1))
                        repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                    result += repl;
                    i += len;
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                result += text[i];
                i++;
            }
        }
        return result;
    }

    // Определение "мусорных" слов (смех, абстрактные звуки)
    function isGarbageWord(word) {
        if (!word || word.length === 0) return true;
        const lower = word.toLowerCase();
        if (word.length <= 2 && !rusToMellExceptions.has(lower)) return true;
        const laughPatterns = [
            /(ха){2,}/i, /(ах){2,}/i, /(ол){2,}/i, /(ло){2,}/i, /(ла){2,}/i,
            /хехе/i, /хихи/i, /хохо/i, /лол/i, /кек/i, /агага/i, /уху/i,
            /ааа+/i, /ыыы+/i, /еее+/i
        ];
        for (let p of laughPatterns) if (p.test(lower)) return true;
        if (/(.)\1{3,}/i.test(lower)) return true;
        if (word === word.toUpperCase() && lower.length >= 4 && /^(?:[а-яa-z])(?:[^а-яa-z]?\1)+$/i.test(lower)) return true;
        if (!/[аеёиоуыэюяaeiou]/i.test(lower)) return true;
        return false;
    }

    // Общее правило для меллстройного (попа -> попоность)
    function applyGeneralRule(wordLower) {
        if (wordLower.endsWith("а")) return wordLower.slice(0, -1) + "оность";
        if (wordLower.endsWith("я")) return wordLower.slice(0, -1) + "ёность";
        if (wordLower.endsWith("о")) return wordLower.slice(0, -1) + "ость";
        if (wordLower.endsWith("е")) return wordLower.slice(0, -1) + "есть";
        return wordLower + "ность";
    }

    function reverseGeneralRule(wordLower) {
        if (wordLower.endsWith("оность")) {
            let base = wordLower.slice(0, -6);
            if (base) return base + "а";
        }
        if (wordLower.endsWith("ёность")) {
            let base = wordLower.slice(0, -6);
            if (base) return base + "я";
        }
        if (wordLower.endsWith("ость")) {
            let base = wordLower.slice(0, -4);
            if (base) return base + "о";
        }
        if (wordLower.endsWith("есть")) {
            let base = wordLower.slice(0, -4);
            if (base) return base + "е";
        }
        if (wordLower.endsWith("ность")) {
            let base = wordLower.slice(0, -5);
            if (base) return base;
        }
        return null;
    }

    function applyCase(original, transformed) {
        if (!original || !transformed) return transformed;
        if (original === original.toUpperCase()) return transformed.toUpperCase();
        if (original[0] === original[0].toUpperCase() && original.slice(1).toLowerCase() === original.slice(1))
            return transformed.charAt(0).toUpperCase() + transformed.slice(1).toLowerCase();
        return transformed.toLowerCase();
    }

    function tokenize(text) {
        const regex = /([a-zA-Zа-яА-ЯёЁ]+|[^a-zA-Zа-яА-ЯёЁ]+)/g;
        return text.match(regex) || [];
    }

    // --------------------------------------------------------------
    // ПЕРЕВОД РУССКИЙ -> МЕЛЛСТРОЙНЫЙ
    // --------------------------------------------------------------
    function translateToMell(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseRusToMell) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) {
                out.push(placeholders.get(t));
                continue;
            }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) {
                out.push(t);
                continue;
            }
            const low = t.toLowerCase();
            if (rusToMellExceptions.has(low)) {
                out.push(applyCase(t, rusToMellExceptions.get(low)));
                continue;
            }
            if (isGarbageWord(t)) {
                out.push(t);
                continue;
            }
            out.push(applyCase(t, applyGeneralRule(low)));
        }
        return out.join('');
    }

    // --------------------------------------------------------------
    // ПЕРЕВОД МЕЛЛСТРОЙНЫЙ -> РУССКИЙ
    // --------------------------------------------------------------
    function translateToRus(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseMellToRus) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) {
                out.push(placeholders.get(t));
                continue;
            }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) {
                out.push(t);
                continue;
            }
            const low = t.toLowerCase();
            if (mellToRusExceptions.has(low)) {
                out.push(applyCase(t, mellToRusExceptions.get(low)));
                continue;
            }
            const recovered = reverseGeneralRule(low);
            if (recovered) {
                out.push(applyCase(t, recovered));
            } else {
                out.push(t);
            }
        }
        let result = out.join('');
        result = result.replace(/\bЧ\b/g, 'Я').replace(/\bч\b/g, 'я');
        return result;
    }

    // --------------------------------------------------------------
    // ПЕРЕВОД РУССКИЙ -> USB
    // --------------------------------------------------------------
    function translateToUsb(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseRusToUsb) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) {
                out.push(placeholders.get(t));
                continue;
            }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) {
                out.push(t);
                continue;
            }
            const low = t.toLowerCase();
            if (rusToUsbExceptions.has(low)) {
                out.push(applyCase(t, rusToUsbExceptions.get(low)));
                continue;
            }
            out.push(translitToLatin(t));
        }
        return out.join('');
    }

    // --------------------------------------------------------------
    // ПЕРЕВОД USB -> РУССКИЙ
    // --------------------------------------------------------------
    function translateFromUsb(text) {
        if (!text.trim()) return "";
        let working = text;
        const placeholders = new Map();
        let idx = 0;
        for (let [from, to] of phraseUsbToRus) {
            const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(^|[\\s\\p{P}])(${escaped})(?=[\\s\\p{P}]|$)`, 'giu');
            working = working.replace(regex, (match, before, word) => {
                let replacement = to;
                if (word === word.toUpperCase()) replacement = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    replacement = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else replacement = to.toLowerCase();
                const ph = `\uE000${idx++}\uE001`;
                placeholders.set(ph, replacement);
                return before + ph;
            });
        }
        const tokens = tokenize(working);
        const out = [];
        for (let t of tokens) {
            if (placeholders.has(t)) {
                out.push(placeholders.get(t));
                continue;
            }
            if (!/[a-zA-Z]/.test(t)) {
                out.push(t);
                continue;
            }
            const low = t.toLowerCase();
            if (usbToRusExceptions.has(low)) {
                out.push(applyCase(t, usbToRusExceptions.get(low)));
                continue;
            }
            out.push(translitToCyrillic(t));
        }
        return out.join('');
    }

    // --------------------------------------------------------------
    // UI
    // --------------------------------------------------------------
    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const leftLangSelect = document.getElementById('leftLangSelect');
    const rightLangSelect = document.getElementById('rightLangSelect');
    const swapBtn = document.getElementById('swapBtn');

    function updateTranslation() {
        const src = leftLangSelect.value;
        const dst = rightLangSelect.value;
        if (src === dst) {
            outputArea.innerText = inputArea.value;
            return;
        }
        const text = inputArea.value;
        let result;
        if (src === 'ru' && dst === 'mell') result = translateToMell(text);
        else if (src === 'mell' && dst === 'ru') result = translateToRus(text);
        else if (src === 'ru' && dst === 'usb') result = translateToUsb(text);
        else if (src === 'usb' && dst === 'ru') result = translateFromUsb(text);
        else if (src === 'mell' && dst === 'usb') result = translateToUsb(translateToRus(text));
        else if (src === 'usb' && dst === 'mell') result = translateToMell(translateFromUsb(text));
        else result = text;
        outputArea.innerText = result;
    }

    let debounceTimer;
    function debouncedUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateTranslation, 250);
    }

    inputArea.addEventListener('input', debouncedUpdate);
    leftLangSelect.addEventListener('change', () => {
        if (leftLangSelect.value === rightLangSelect.value) {
            const other = leftLangSelect.value === 'ru' ? 'mell' : (leftLangSelect.value === 'mell' ? 'usb' : 'ru');
            rightLangSelect.value = other;
        }
        debouncedUpdate();
    });
    rightLangSelect.addEventListener('change', () => {
        if (rightLangSelect.value === leftLangSelect.value) {
            const other = rightLangSelect.value === 'ru' ? 'mell' : (rightLangSelect.value === 'mell' ? 'usb' : 'ru');
            leftLangSelect.value = other;
        }
        debouncedUpdate();
    });

    function swapLanguages() {
        const leftLang = leftLangSelect.value;
        const rightLang = rightLangSelect.value;
        leftLangSelect.value = rightLang;
        rightLangSelect.value = leftLang;
        const leftText = inputArea.value;
        const rightText = outputArea.innerText;
        inputArea.value = rightText;
        updateTranslation();
    }
    swapBtn.addEventListener('click', swapLanguages);

    // Пример для демонстрации
    inputArea.value = 'нормально, попа, жопа, училка, нет, почему, хай, шприц';
    updateTranslation();
</script>
