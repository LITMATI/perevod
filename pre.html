<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Технические шоколадки | Скоро вернёмся</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fef9e6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            text-align: center;
            border: 1px solid #ffedd5;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #4a2e1f;
            margin-bottom: 1rem;
        }
        .chocolate-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }
        p {
            color: #5c3e2b;
            line-height: 1.5;
            margin: 1rem 0;
            font-size: 1.1rem;
        }
        .message {
            background: #fff7ed;
            padding: 1rem;
            border-radius: 1.5rem;
            margin: 1.5rem 0;
            border-left: 5px solid #c47f3e;
            text-align: left;
        }
        .small {
            font-size: 0.8rem;
            color: #9b7b5c;
            margin-top: 1rem;
        }
        .button {
            display: inline-block;
            background: #f1e5d2;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            color: #7b4a2c;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            margin-top: 0.5rem;
            border: 1px solid #e7d5bd;
        }
        .button:hover {
            background: #e7d5bd;
            transform: scale(1.01);
        }
        @media (max-width: 500px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="chocolate-icon">🍫</div>
    <h1>Технические шоколадки</h1>
    <p>Сайт временно закрыт</p>
    <div class="message">
        🛠️ Ведутся сладкие технические работы.<br>
        Проблемы с сервером, печеньки и горячий шоколад.<br>
        Скоро всё починим и откроем снова.
    </div>
    <div class="small">
        Приносим извинения за неудобства.<br>
        Загляните чуть позже — шоколадки уже тают в работе.
    </div>
    <a href="#" class="button" onclick="return false;">↻ Обновить позже</a>
</div>
</body>
</html>
